{% extends 'base.html' %}
{% block title %}Add Review{% endblock %}
{% block content %}

<h2>Add Review</h2>

<div class="card p-3 mb-3">
  <h5 class="mb-0">{{ book.title }}</h5>
  <div class="text-muted">Author: {{ book.author.display_name }}</div>
</div>

<form method="post" class="card p-3">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-dark">Add Review</button>
</form>

{% endblock %}
